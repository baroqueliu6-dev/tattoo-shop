<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - Beijing Medical Concierge</title>
    <link rel="stylesheet" href="css/concierge-style.css">
    <style>
        .cancelled-page {
            max-width: 700px;
            margin: 0 auto;
            padding: 4rem 2rem;
            text-align: center;
        }
        
        .cancelled-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        .cancelled-page h1 {
            color: #f59e0b;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .cancelled-page p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .btn-secondary {
            background: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="cancelled-page">
        <div class="cancelled-icon">⚠️</div>
        <h1>Payment Cancelled</h1>
        <p>No worries! Your payment was not processed. If you changed your mind or encountered any issues, feel free to reach out to us.</p>
        
        <div class="btn-group">
            <a href="payment.html" class="btn btn-primary">💳 Try Payment Again</a>
            <a href="index.html#contact" class="btn btn-secondary">📧 Contact Us Instead</a>
        </div>
        
        <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
            <p style="font-size: 0.9rem; color: #999;">
                Questions? Email us at <a href="mailto:hello@13801380.site" style="color: var(--primary-color);">hello@13801380.site</a>
            </p>
        </div>
    </div>
</body>
</html>
